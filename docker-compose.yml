services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sprintmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sprintmind}
      POSTGRES_DB: ${POSTGRES_DB:-sprintmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintmind"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sprintmind

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sprintmind.io}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sprintmind

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sprintmind
    profiles:
      - ai

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sprintmind}:${POSTGRES_PASSWORD:-sprintmind}@postgres:5432/${POSTGRES_DB:-sprintmind}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:3001,http://localhost
      FRONTEND_URL: http://localhost:3001
    volumes:
      - ./backend/app:/app/app
      - ./deploy:/app/deploy
      - ./data/uploads:/app/data/uploads
      - ./data/workspace:/app/data/workspace
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sprintmind

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sprintmind

volumes:
  postgres_data:
  pgadmin_data:
  ollama_data:

networks:
  sprintmind:
    driver: bridge
