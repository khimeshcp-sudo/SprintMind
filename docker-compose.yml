services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sprintmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sprintmind}
      POSTGRES_DB: ${POSTGRES_DB:-sprintmind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprintmind"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sprintmind

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@sprintmind.io}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sprintmind

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sprintmind
    profiles:
      - ai

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-sprintmind}:${POSTGRES_PASSWORD:-sprintmind}@postgres:5432/${POSTGRES_DB:-sprintmind}
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:3001,http://localhost
      FRONTEND_URL: http://localhost:3001
      MAGENTO_PROJECT_PATH: /app/magento
      MAGENTO_GIT_BASE_BRANCH: ${MAGENTO_GIT_BASE_BRANCH:-main}
      MAGENTO_GIT_CREATE_BRANCH: ${MAGENTO_GIT_CREATE_BRANCH:-true}
      LLM_DEBUG: ${LLM_DEBUG:-true}
      LLM_DEBUG_FULL: ${LLM_DEBUG_FULL:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-180}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash-lite}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      MAGENTO_GIT_API_BASE_URL: ${MAGENTO_GIT_API_BASE_URL:-https://api.github.com/repos/khimeshcp-sudo/m249}
      MAGENTO_GIT_API_TOKEN: ${MAGENTO_GIT_API_TOKEN:-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}
      MAGENTO_GIT_USER_NAME: ${MAGENTO_GIT_USER_NAME:-SprintMind Bot}
      MAGENTO_GIT_USER_EMAIL: ${MAGENTO_GIT_USER_EMAIL:-sprintmind-bot@users.noreply.github.com}
    volumes:
      - ./backend/app:/app/app
      - ./deploy:/app/deploy
      - ./data/uploads:/app/data/uploads
      - ./data/workspace:/app/data/workspace
      - "${MAGENTO_PROJECT_PATH:-/home/cp/Downloads/mage249 1}:/app/magento:rw"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - sprintmind
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - sprintmind

volumes:
  postgres_data:
  pgadmin_data:
  ollama_data:

networks:
  sprintmind:
    driver: bridge
